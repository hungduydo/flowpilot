services:
  # ─── n8n Workflow Automation Server ───
  n8n:
    image: n8nio/n8n:latest
    container_name: llm-workflow-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-llmworkflow}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-llmworkflow123}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── FastAPI Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-workflow-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-llmworkflow}:${POSTGRES_PASSWORD:-llmworkflow123}@postgres:5432/llm_workflow
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:latest}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      n8n:
        condition: service_started
      # ollama: no hard dependency — backend handles offline gracefully
    restart: unless-stopped
    volumes:
      - ./backend:/app

  # ─── Next.js Frontend (Phase 4 — run with: docker compose --profile frontend up) ───
  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-workflow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_N8N_URL=http://localhost:5678
    depends_on:
      - backend

  # ─── PostgreSQL (shared: app DB + n8n DB) ───
  postgres:
    image: postgres:16-alpine
    container_name: llm-workflow-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-llmworkflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-llmworkflow123}
      - POSTGRES_DB=llm_workflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmworkflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis (session cache) ───
  redis:
    image: redis:7-alpine
    container_name: llm-workflow-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Ollama runs on HOST machine (not in Docker) ───
  # Connect via host.docker.internal:11434
  # Start with: ollama serve (on host terminal)

  # ─── ChromaDB (RAG vector store) ───
  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-workflow-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chromadata:/chroma/chroma
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  chromadata:
  n8n_data:
